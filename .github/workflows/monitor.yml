name: Tokyo

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 快取 pip 套件
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-playwright-requests

      - name: 安裝 Python 套件
        run: pip install playwright requests

      - name: 快取 Playwright 瀏覽器
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: 安裝 Playwright Chromium（僅快取不存在時）
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: 安裝系統依賴（快取命中時仍需執行）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 執行空房監控
        env:
          SCRAPE_URLS:          ${{ secrets.SCRAPE_URLS }}
          TG_BOT_TOKEN:         ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:           ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_NOTIFY_TOKEN:    ${{ secrets.LINE_NOTIFY_TOKEN }}
          EMAIL_SMTP_SERVER:    ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT:      ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME:       ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TARGET_ADDRESS: ${{ secrets.EMAIL_TARGET_ADDRESS }}
        run: python scraper.py
